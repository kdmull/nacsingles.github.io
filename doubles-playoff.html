<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/jpg" href="favicon.jpg"/>
<title>Doubles Playoff — NAC Pickleball</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1a2a6c;--navy-dark:#111d4e;
  --green:#4caf28;--green-dark:#3a8c1e;
  --white:#ffffff;--off-white:#f4f7fb;
  --surface:#f0f4f9;--surface2:#e3eaf4;
  --text:#1a2a6c;--muted:#5a6a9a;--border:rgba(26,42,108,0.12);
  --danger:#d93b3b;--gold:#d4a017;
  --font-display:'Barlow Condensed',sans-serif;
  --font-body:'Barlow',sans-serif;
  --radius:8px;--radius-lg:12px;
}
body{background:var(--off-white);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.6;min-height:100vh;-webkit-text-size-adjust:100%}
nav{background:var(--navy);padding:0 max(1.5rem,env(safe-area-inset-right)) 0 max(1.5rem,env(safe-area-inset-left));display:flex;align-items:center;flex-wrap:wrap;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--green)}
.nav-brand{display:flex;align-items:center;gap:12px;padding:.65rem 0;margin-right:auto;text-decoration:none}
.nav-logo{height:44px;width:auto}
.nav-tabs{display:flex}
.nav-tab{padding:1rem .95rem;font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:rgba(255,255,255,.6);cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;text-decoration:none;display:block}
.nav-tab:hover{color:var(--white)}.nav-tab.active{color:var(--green);border-bottom-color:var(--green)}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--white);font-family:var(--font-display);font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;padding:.7rem 1.2rem;transition:color .12s;text-decoration:none;border-right:1px solid rgba(255,255,255,.15)}
.back-btn:hover{color:var(--green)}
.league-banner{background:var(--surface2);border-bottom:1px solid var(--border);padding:16px 1.5rem;font-family:var(--font-display);font-size:22px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:var(--navy);text-align:center}
.page{padding:2rem 1.5rem;max-width:1000px;margin:0 auto}
.section-header{margin-bottom:1.5rem;display:flex;align-items:flex-end;gap:16px}
.section-header-text h2{font-family:var(--font-display);font-size:28px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:var(--navy)}
.section-header-text p{color:var(--muted);font-size:14px;margin-top:2px}
.section-accent{width:4px;height:40px;background:var(--green);border-radius:2px;flex-shrink:0}
.btn{padding:8px 20px;border-radius:var(--radius);font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:all .12s;border:1.5px solid transparent;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn-primary{background:var(--navy);color:var(--white);border-color:var(--navy)}.btn-primary:hover{background:var(--navy-dark)}.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-green{background:var(--green);color:var(--white);border-color:var(--green)}.btn-green:hover{background:var(--green-dark)}
.btn-ghost{background:transparent;border-color:var(--border);color:var(--muted)}.btn-ghost:hover{border-color:var(--navy);color:var(--navy)}
.btn-danger{background:transparent;border-color:rgba(217,59,59,.3);color:var(--danger)}.btn-danger:hover{background:rgba(217,59,59,.06)}

/* STANDINGS TABLE */
.standings-table{width:100%;border-collapse:collapse;background:var(--white);border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border);box-shadow:0 1px 4px rgba(26,42,108,.06);margin-bottom:1.5rem}
.standings-table thead{background:var(--navy)}
.standings-table th{font-family:var(--font-display);font-weight:700;font-size:13px;letter-spacing:.5px;text-transform:uppercase;color:rgba(255,255,255,.7);padding:11px 14px;text-align:left}
.standings-table th.num{text-align:center}
.standings-table td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.standings-table td.num{text-align:center;font-weight:600}
.standings-table tbody tr:last-child td{border-bottom:none}
.standings-table tbody tr:hover{background:var(--surface)}
.rank{font-family:var(--font-display);font-size:18px;font-weight:700;color:var(--muted);white-space:nowrap;display:block;text-align:center}
.rank-1{color:var(--gold)}.rank-2{color:#8a8a8a}.rank-3{color:#a0522d}
.winner-badge{display:inline-block;font-family:var(--font-display);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gold);background:rgba(212,160,23,.12);padding:2px 8px;border-radius:4px;margin-left:6px}

/* MATCH CARDS */
.matches-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:1.5rem}
.match-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;display:flex;align-items:center;gap:16px;box-shadow:0 1px 3px rgba(26,42,108,.05)}
.match-card.completed{border-left:4px solid var(--green)}.match-card.upcoming{border-left:4px solid var(--surface2)}
.match-num{font-family:var(--font-display);font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;min-width:60px}
.match-teams{flex:1;display:flex;align-items:center;gap:10px;min-width:0}
.team-name{font-weight:600;font-size:14px;color:var(--navy);flex:1;min-width:0}
.team-name.winner{color:var(--green-dark)}
.vs-badge{font-family:var(--font-display);font-size:11px;font-weight:700;color:var(--muted);background:var(--surface);padding:2px 8px;border-radius:4px;flex-shrink:0}
.match-score{font-family:var(--font-display);font-size:18px;font-weight:700;min-width:80px;text-align:center;color:var(--navy)}
.score-btn{padding:7px 14px;background:transparent;border:1.5px solid var(--navy);border-radius:var(--radius);font-family:var(--font-display);font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--navy);cursor:pointer;transition:all .12s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.score-btn:hover{background:var(--navy);color:var(--white)}

/* AUTH GATE */
.auth-gate{text-align:center;padding:3rem 1rem}
.auth-gate h3{font-family:var(--font-display);font-size:22px;font-weight:800;text-transform:uppercase;color:var(--navy);margin-bottom:.5rem}
.auth-gate p{color:var(--muted);margin-bottom:1.2rem;font-size:14px}
.auth-gate input{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);padding:9px 14px;font-size:16px;width:180px;outline:none;font-family:var(--font-body);margin-right:8px}
.auth-gate input:focus{border-color:var(--navy)}
.auth-gate .err{color:var(--danger);font-size:13px;margin-top:8px}

/* ADMIN SETUP */
.admin-section{background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1.5rem;box-shadow:0 1px 3px rgba(26,42,108,.05)}
.admin-section h3{font-family:var(--font-display);font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--navy);margin-bottom:1rem;padding-bottom:.5rem;border-bottom:2px solid var(--green)}
.team-setup-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.team-setup-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem}
.team-setup-card h4{font-family:var(--font-display);font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--navy);margin-bottom:.75rem}
.admin-input{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:6px 10px;font-size:14px;width:100%;font-family:var(--font-body);outline:none;margin-bottom:6px}
.admin-input:focus{border-color:var(--navy)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(10,20,60,.6);z-index:999;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--white);border-radius:var(--radius-lg);padding:2rem;width:100%;max-width:400px;border-top:4px solid var(--navy)}
.modal h3{font-family:var(--font-display);font-size:20px;font-weight:900;text-transform:uppercase;color:var(--navy);margin-bottom:1.2rem}
.modal-teams{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;text-align:center}
.modal-team{flex:1;font-weight:600;font-size:13px;color:var(--navy)}
.modal-vs{font-family:var(--font-display);font-weight:700;color:var(--muted)}
.score-row{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin-bottom:1.5rem}
.score-wrap{display:flex;flex-direction:column;gap:4px;align-items:center}
.score-wrap label{font-size:11px;color:var(--muted);font-family:var(--font-display);text-transform:uppercase;letter-spacing:.5px}
.score-wrap input{width:80px;text-align:center;font-family:var(--font-display);font-size:32px;font-weight:700;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--navy);padding:8px;outline:none;min-height:56px}
.score-wrap input:focus{border-color:var(--navy)}
.score-dash{font-family:var(--font-display);font-size:28px;font-weight:700;color:var(--muted)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}

.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--navy);color:var(--white);padding:10px 20px;border-radius:var(--radius);font-family:var(--font-display);font-weight:700;font-size:14px;text-transform:uppercase;letter-spacing:.5px;transform:translateY(80px);opacity:0;transition:all .25s;z-index:9999;pointer-events:none;border-left:4px solid var(--green)}
.toast.show{transform:translateY(0);opacity:1}
.loading-overlay{display:flex;align-items:center;justify-content:center;padding:4rem;color:var(--muted);font-family:var(--font-display);font-size:16px;text-transform:uppercase;letter-spacing:1px;gap:12px}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:768px){
  nav{flex-wrap:wrap}
  .nav-brand{width:100%;justify-content:center;margin-right:0;padding:.5rem 0}
  .nav-logo{height:36px}
  .back-btn{display:none}
  .nav-tabs{width:100%;border-top:1px solid rgba(255,255,255,.08);overflow-x:auto;scrollbar-width:none}
  .nav-tabs::-webkit-scrollbar{display:none}
  .nav-tab{flex:1;padding:.7rem .5rem;font-size:13px;text-align:center;min-width:70px}
  .match-card{flex-wrap:wrap;gap:8px}
  .match-num{width:100%;font-size:11px}
  .score-btn{width:100%;text-align:center}
  .team-setup-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">
    <img src="naclogo.png" class="nav-logo" alt="NAC"/>
  </a>
  <a class="back-btn" href="index.html">← Leagues</a>
  <div class="nav-tabs" id="nav-tabs">
    <a class="nav-tab" id="tab-standings" href="#" style="text-decoration:none">Standings</a>
    <a class="nav-tab" id="tab-schedule" href="#" style="text-decoration:none">Schedule</a>
    <a class="nav-tab" id="tab-scores" href="#" style="text-decoration:none">Scores</a>
    <a class="nav-tab active" style="text-decoration:none">Playoffs</a>
  </div>
</nav>

<div class="league-banner" id="league-banner">Loading...</div>

<div class="page">
  <div class="section-header">
    <div class="section-accent"></div>
    <div class="section-header-text">
      <h2>Playoff Round Robin</h2>
      <p>Top 4 teams — each team plays 3 matches</p>
    </div>
  </div>

  <div id="main-content">
    <div class="loading-overlay"><div class="spinner"></div>Loading...</div>
  </div>
</div>

<!-- SCORE MODAL -->
<div class="modal-overlay" id="score-modal">
  <div class="modal">
    <h3>Enter Score</h3>
    <div class="modal-teams">
      <div class="modal-team" id="modal-t1">—</div>
      <div class="modal-vs">vs</div>
      <div class="modal-team" id="modal-t2">—</div>
    </div>
    <div class="score-row">
      <div class="score-wrap">
        <label id="modal-label1">Team 1</label>
        <input type="number" min="0" max="30" id="modal-s1" placeholder="0"/>
      </div>
      <div class="score-dash">—</div>
      <div class="score-wrap">
        <label id="modal-label2">Team 2</label>
        <input type="number" min="0" max="30" id="modal-s2" placeholder="0"/>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="submit-btn" onclick="submitScore()">Save Score</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
const PLAYOFF_KEY_PREFIX = 'playoff_';
let playoffData = null;
let playerAuthed = false;
let adminAuthed = false;
let playoffModalMatch = null;
let leagueId = null;

window.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  leagueId = params.get('league');
  currentLeague = LEAGUES.find(l => l.id === leagueId);

  if(!currentLeague || currentLeague.type !== 'doubles') {
    document.getElementById('main-content').innerHTML = '<div class="loading-overlay">Invalid league.</div>';
    return;
  }

  document.title = `Playoffs — ${currentLeague.name}`;
  document.getElementById('league-banner').textContent = currentLeague.name;

  // Update nav links
  document.getElementById('tab-standings').href = `league.html?league=${leagueId}`;
  document.getElementById('tab-schedule').href = `league.html?league=${leagueId}`;
  document.getElementById('tab-scores').href = `league.html?league=${leagueId}`;

  await loadData();
  await loadPlayoff();
  render();
});

document.getElementById('score-modal').addEventListener('click', e => {
  if(e.target === e.currentTarget) closeModal();
});

// ── PLAYOFF DATA ──────────────────────────────────────
function playoffKey() { return PLAYOFF_KEY_PREFIX + leagueId; }

async function loadPlayoff() {
  try {
    const result = await dbGet(playoffKey());
    if(result && result.data && result.data.teams && result.data.teams.length === 4) {
      playoffData = result.data;
    } else {
      playoffData = initPlayoff();
    }
  } catch(e) {
    playoffData = initPlayoff();
  }
}

async function savePlayoff() {
  await dbSet(playoffKey(), playoffData);
}

function initPlayoff() {
  // 4 teams, each is {p1, p2} (player names)
  const teams = [
    {p1:'', p2:''},
    {p1:'', p2:''},
    {p1:'', p2:''},
    {p1:'', p2:''},
  ];
  // Generate all 6 round robin matchups: 0v1, 0v2, 0v3, 1v2, 1v3, 2v3
  const matches = [];
  for(let i=0; i<4; i++) for(let j=i+1; j<4; j++) {
    matches.push({t1:i, t2:j, s1:null, s2:null});
  }
  return {teams, matches};
}

function getTeamName(team) {
  if(!team || (!team.p1 && !team.p2)) return 'TBD';
  if(team.p1 && team.p2) return `${team.p1} / ${team.p2}`;
  return team.p1 || team.p2;
}

function getStandings() {
  const stats = playoffData.teams.map((t,i) => ({idx:i, w:0, l:0, ptsFor:0, ptsAgainst:0}));
  for(const m of playoffData.matches) {
    if(m.s1 !== null && m.s2 !== null) {
      const win = m.s1 > m.s2 ? m.t1 : m.t2;
      const los = m.s1 > m.s2 ? m.t2 : m.t1;
      stats[win].w++;
      stats[los].l++;
      stats[win].ptsFor += Math.max(m.s1, m.s2);
      stats[win].ptsAgainst += Math.min(m.s1, m.s2);
      stats[los].ptsFor += Math.min(m.s1, m.s2);
      stats[los].ptsAgainst += Math.max(m.s1, m.s2);
    }
  }
  return stats.sort((a,b) => b.w - a.w || (b.ptsFor - b.ptsAgainst) - (a.ptsFor - a.ptsAgainst));
}

// ── RENDER ─────────────────────────────────────────────
function render() {
  const teamsSet = playoffData.teams.every(t => t.p1 || t.p2);
  const standings = getStandings();
  const played = playoffData.matches.filter(m => m.s1 !== null).length;
  const allDone = played === playoffData.matches.length;
  const winner = allDone ? playoffData.teams[standings[0].idx] : null;

  const standingsHTML = `
    <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--radius-lg);border:1px solid var(--border);margin-bottom:1.5rem">
      <table class="standings-table" style="border:none;border-radius:0">
        <thead><tr>
          <th style="width:40px">#</th>
          <th>Team</th>
          <th class="num">W</th>
          <th class="num">L</th>
          <th class="num">Pts +/-</th>
        </tr></thead>
        <tbody>
          ${standings.map((s,i) => {
            const team = playoffData.teams[s.idx];
            const diff = s.ptsFor - s.ptsAgainst;
            const rc = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
            return `<tr>
              <td><span class="rank ${rc}">${i+1}</span></td>
              <td><strong>${getTeamName(team)}</strong>${i===0&&allDone?'<span class="winner-badge">Champion</span>':''}</td>
              <td class="num">${s.w}</td>
              <td class="num">${s.l}</td>
              <td class="num" style="color:${diff>=0?'var(--green-dark)':'var(--danger)'}">${diff>0?'+':''}${diff}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;

  const matchesHTML = `
    <h3 style="font-family:var(--font-display);font-size:20px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--navy);margin-bottom:1rem">Matches</h3>
    <div class="matches-grid">
      ${playoffData.matches.map((m,i) => {
        const t1 = playoffData.teams[m.t1];
        const t2 = playoffData.teams[m.t2];
        const done = m.s1 !== null;
        const t1win = done && m.s1 > m.s2;
        const t2win = done && m.s2 > m.s1;
        const canScore = playerAuthed || adminAuthed;
        return `<div class="match-card ${done?'completed':'upcoming'}">
          <div class="match-num">Match ${i+1}</div>
          <div class="match-teams">
            <span class="team-name${t1win?' winner':''}">${getTeamName(t1)}</span>
            <span class="vs-badge">vs</span>
            <span class="team-name${t2win?' winner':''}">${getTeamName(t2)}</span>
          </div>
          <div class="match-score">${done ? m.s1+' — '+m.s2 : '—'}</div>
          ${canScore ? `<button class="score-btn" onclick="openModal(${i})">${done?'Edit':'Enter Score'}</button>` : ''}
          <div style="font-size:12px;color:var(--muted);min-width:50px;text-align:right">${done?'Final':'Pending'}</div>
        </div>`;
      }).join('')}
    </div>`;

  // Auth section
  const authHTML = !playerAuthed && !adminAuthed ? `
    <div class="auth-gate" style="padding:1.5rem;text-align:left;background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:1.5rem;box-shadow:0 1px 3px rgba(26,42,108,.05)">
      <p style="color:var(--muted);font-size:14px;margin-bottom:.75rem">Enter password to submit scores</p>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input type="password" id="player-pw" placeholder="League password"
          style="background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);padding:8px 12px;font-size:16px;width:180px;outline:none;font-family:var(--font-body)"
          onkeydown="if(event.key==='Enter')checkAuth()"
          onfocus="this.style.borderColor='var(--navy)'" onblur="this.style.borderColor='var(--border)'"/>
        <button class="btn btn-primary" onclick="checkAuth()">Enter</button>
      </div>
      <p id="auth-err" style="color:var(--danger);font-size:13px;margin-top:6px;min-height:16px"></p>
    </div>` : `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap">
      <span style="font-size:13px;color:var(--green-dark);font-weight:600">✓ Authenticated — click any match to enter scores</span>
    </div>`;

  // Admin setup section
  const adminSetupHTML = adminAuthed ? `
    <div class="admin-section">
      <h3>Team Setup</h3>
      <p style="color:var(--muted);font-size:13px;margin-bottom:1rem">Enter the 4 playoff teams below, then click Save.</p>
      <div class="team-setup-grid">
        ${playoffData.teams.map((t,i) => `
          <div class="team-setup-card">
            <h4>Team ${i+1}</h4>
            <input class="admin-input" placeholder="Player 1" value="${t.p1||''}" oninput="playoffData.teams[${i}].p1=this.value"/>
            <input class="admin-input" placeholder="Player 2" value="${t.p2||''}" oninput="playoffData.teams[${i}].p2=this.value"/>
          </div>`).join('')}
      </div>
      <div style="display:flex;gap:8px;margin-top:1rem;flex-wrap:wrap">
        <button class="btn btn-green" onclick="saveTeams()">Save Teams</button>
        <button class="btn btn-danger" onclick="resetPlayoff()">Reset All Scores</button>
      </div>
    </div>` : '';

  document.getElementById('main-content').innerHTML = authHTML + adminSetupHTML + standingsHTML + matchesHTML;
}

// ── AUTH ───────────────────────────────────────────────
function checkAuth() {
  const pw = document.getElementById('player-pw').value;
  if(pw === ADMIN_PW) { adminAuthed = true; playerAuthed = true; render(); }
  else if(pw === SCORES_PW) { playerAuthed = true; render(); }
  else {
    document.getElementById('auth-err').textContent = 'Incorrect password.';
    document.getElementById('player-pw').value = '';
  }
}

// ── ADMIN ──────────────────────────────────────────────
async function saveTeams() {
  await savePlayoff();
  render();
  showToast('Teams saved!');
}

async function resetPlayoff() {
  if(!confirm('Reset all playoff scores? Team setup will be kept.')) return;
  for(const m of playoffData.matches) { m.s1 = null; m.s2 = null; }
  await savePlayoff();
  render();
  showToast('Scores reset!');
}

// ── SCORE MODAL ────────────────────────────────────────
function openModal(idx) {
  const m = playoffData.matches[idx];
  playoffModalMatch = idx;
  const t1 = getTeamName(playoffData.teams[m.t1]);
  const t2 = getTeamName(playoffData.teams[m.t2]);
  document.getElementById('modal-t1').textContent = t1;
  document.getElementById('modal-t2').textContent = t2;
  document.getElementById('modal-label1').textContent = t1;
  document.getElementById('modal-label2').textContent = t2;
  document.getElementById('modal-s1').value = m.s1 !== null ? m.s1 : '';
  document.getElementById('modal-s2').value = m.s2 !== null ? m.s2 : '';
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('score-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('score-modal').classList.remove('open');
  playoffModalMatch = null;
}

async function submitScore() {
  const s1 = parseInt(document.getElementById('modal-s1').value);
  const s2 = parseInt(document.getElementById('modal-s2').value);
  if(isNaN(s1)||isNaN(s2)||s1<0||s2<0) { showToast('Enter valid scores!'); return; }
  if(s1===s2) { showToast('No ties in pickleball!'); return; }
  document.getElementById('submit-btn').disabled = true;
  playoffData.matches[playoffModalMatch].s1 = s1;
  playoffData.matches[playoffModalMatch].s2 = s2;
  await savePlayoff();
  closeModal();
  render();
  showToast('Score saved!');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
